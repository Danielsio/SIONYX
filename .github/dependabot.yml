version: 2
updates:
  # GitHub Actions (keeps the SHA-pinned actions current + patches supply-chain CVEs)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # npm — one entry per lockfile. Majors are EXCLUDED from the groups so they
  # arrive as individual PRs that can be judged (or migrated) one by one —
  # a grouped "everything" bump smuggled antd 5→6 + eslint 10 into one
  # unmergeable PR (#41). Minor/patch groups stay auto-merge-friendly.
  - package-ecosystem: npm
    directory: /sionyx-web
    schedule:
      interval: weekly
    groups:
      web-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: npm
    directory: /sionyx-server
    schedule:
      interval: weekly
    groups:
      server-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: npm
    directory: /tests/rules
    schedule:
      interval: weekly
    groups:
      rules-tests-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # NuGet — the WPF kiosk
  - package-ecosystem: nuget
    directory: /sionyx-kiosk-wpf
    schedule:
      interval: weekly
    groups:
      kiosk-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # WiX v7+ requires the paid Open Source Maintenance Fee EULA (WIX7015);
      # we stay on the fee-free v6 line.
      - dependency-name: "WixToolset.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "wix"
        update-types: ["version-update:semver-major"]
