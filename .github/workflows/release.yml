name: Release

on:
  push:
    branches: [main]
    paths:
      - 'sionyx-kiosk-wpf/**'
      - 'scripts/release/**'
  workflow_dispatch:
    inputs:
      override:
        description: "Force bump type (leave empty to auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write # create the release + tag
      id-token: write # provenance attestation
      attestations: write # provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.x"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $override = "${{ github.event.inputs.override }}"
          $params = if ($override) { @{ Override = $override } } else { @{} }
          $info = & scripts/release/get-next-version.ps1 @params
          Write-Host "Current: v$($info.Current)"
          Write-Host "Next:    v$($info.Next) ($($info.Bump))"
          Write-Host "Commits: $($info.CommitCount)"
          "version=$($info.Next)" >> $env:GITHUB_OUTPUT
          "bump=$($info.Bump)" >> $env:GITHUB_OUTPUT
          "commits=$($info.CommitCount)" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        working-directory: sionyx-kiosk-wpf
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          NEDARIM_CALLBACK_URL: ${{ secrets.NEDARIM_CALLBACK_URL }}
          ADMIN_EXIT_PASSWORD: ${{ secrets.ADMIN_EXIT_PASSWORD }}
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          # -SkipTests: this code already passed `kiosk-tests` in CI (on the PR and again
          # post-merge) before this release runs. Re-running the full suite here is
          # redundant and was the sole cause of every failed Release (flaky test host).
          powershell -ExecutionPolicy Bypass -File build.ps1 -Version $ver -NoUpload -SkipTests

      - name: Attest build provenance (MSI)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: sionyx-kiosk-wpf/installer/bin/x64/Release/*.msi

      - name: Generate changelog
        shell: pwsh
        run: |
          $info = & scripts/release/get-next-version.ps1
          & scripts/release/generate-changelog.ps1 -Version "${{ steps.version.outputs.version }}" -Commits $info.Commits

      - name: Update version.json
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $parts = $ver -split "\."
          $vf = "sionyx-kiosk-wpf/version.json"
          $data = Get-Content $vf -Raw | ConvertFrom-Json
          $data.version = $ver
          $data.major = [int]$parts[0]
          $data.minor = [int]$parts[1]
          $data.patch = [int]$parts[2]
          $data.buildNumber = [int]$data.buildNumber + 1
          $data.lastBuildDate = (Get-Date).ToString("o")
          $data | ConvertTo-Json -Depth 10 | Set-Content $vf

      - name: Create GitHub Release (creates the tag atomically)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          # main is protected, so we never push a version-bump commit to it. `gh release
          # create --target <sha>` creates the tag + release + uploads the MSI in one step
          # (no orphan-tag partial state), and the tag is the version source of truth.
          $msi = Get-ChildItem "sionyx-kiosk-wpf/installer/bin/x64/Release/*.msi" | Select-Object -First 1
          $notes = "## Release v$ver`n`nBump type: **${{ steps.version.outputs.bump }}** (from ${{ steps.version.outputs.commits }} commits)."
          if ($msi) {
            gh release create "v$ver" $msi.FullName --target $env:GITHUB_SHA --title "v$ver" --notes $notes
          } else {
            gh release create "v$ver" --target $env:GITHUB_SHA --title "v$ver" --notes $notes
          }

      - name: Publish latest release to RTDB (installer hosted on GitHub Releases, off Storage)
        shell: pwsh
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $msi = Get-ChildItem "sionyx-kiosk-wpf/installer/bin/x64/Release/*.msi" | Select-Object -First 1
          if (-not $msi) { Write-Host "No MSI produced; skipping latest-release publish."; exit 0 }
          $asset = "https://github.com/${{ github.repository }}/releases/download/v$ver/$($msi.Name)"
          $sha = (Get-FileHash $msi.FullName -Algorithm SHA256).Hash.ToLower()
          $bn = (Get-Content sionyx-kiosk-wpf/version.json -Raw | ConvertFrom-Json).buildNumber
          $body = @{ version = $ver; downloadUrl = $asset; sha256 = $sha; buildNumber = $bn; channel = 'origin'; edition = 'origin' } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://sionyx-server.sionyx-server.workers.dev/admin/set-latest-release" `
            -Method Post -Headers @{ 'x-sionyx-secret' = $env:ADMIN_SECRET; 'Content-Type' = 'application/json' } -Body $body
          Write-Host "Published public/latestRelease v$ver -> $asset (sha256 $sha)"

      - name: Roll back on failure (no partial release)
        if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Write-Host "Release failed — removing any partial v$ver release + tag for a clean re-run."
          gh release delete "v$ver" --cleanup-tag --yes 2>$null
          git push origin --delete "v$ver" 2>$null
          exit 0
