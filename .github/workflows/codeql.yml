name: CodeQL

# Static analysis (SAST) for the JS/TS surface (web, Worker, functions) and the C#
# kiosk. Runs on PRs, on pushes to main, and weekly. Results appear under the repo's
# Security → Code scanning tab. This workflow is intentionally NOT in `ci-gate` (so a
# scanner hiccup never blocks a merge); enforce findings via branch-protection code
# scanning rules if/when desired.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1" # Mondays 05:23 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: csharp
            build-mode: none # buildless analysis — robust with WPF/WiX
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          category: "/language:${{ matrix.language }}"
